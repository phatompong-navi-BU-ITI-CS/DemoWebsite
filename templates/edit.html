<!DOCTYPE html>
<html>
<head>
    <title>Edit Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1faa49 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #6bff7f, #69c415, #28ce6d);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="number"] {
            appearance: textfield;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 45px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #1cc916;
        }

        .game-preview {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .game-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .game-preview h3 {
            margin: 0;
            color: #333;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>✏️ Edit Game</h2>

        {% if game.image %}
        <div class="game-preview">
            <img src="{{ game.image }}" alt="{{ game.name }}">
            <h3>{{ game.name }}</h3>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="name">🎮 Game Name</label>
                <input id="name" name="name" value="{{ game.name }}" required placeholder="Enter game name">
            </div>

            <div class="form-group">
                <label for="price">💰 Price (THB)</label>
                <input id="price" name="price" type="number" step="0.01" min="0" value="{{ game.price }}" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="image">🖼️ Image URL</label>
                <input id="image" name="image" value="{{ game.image }}" placeholder="https://example.com/image.jpg">
            </div>

            <div class="form-group">
                <label for="stock">📦 Stock Quantity</label>
                <input id="stock" name="stock" type="number" min="0" value="{{ game.stock or 0 }}" required placeholder="0">
            </div>

            <div class="form-group">
                <label for="category_id">🏷️ Category</label>
                <select id="category_id" name="category_id">
                    <option value="">Select Category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if category.id == game.category_id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">✅ Update Game</button>
        </form>

        <a href="/" class="back-link">⬅️ Back to Menu</a>
    </div>
</div>

</body>
</html>
